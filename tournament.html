<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tournament Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F1B14;color:#F4F1E8;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;padding:20px 16px 60px}
.wrap{max-width:500px;margin:0 auto}
.eyebrow{text-align:center;font-size:11px;letter-spacing:.14em;color:#9FC93D;font-weight:700;margin-bottom:4px}
h1{text-align:center;font-family:Georgia,serif;font-size:28px;margin-bottom:4px}
.sub{text-align:center;color:#B9C4B2;font-size:13px;margin-bottom:20px}
.card{background:#16261C;border:1px solid #2A3D2F;border-radius:14px;padding:18px;margin-bottom:14px}
.card-title{font-family:Georgia,serif;font-size:16px;margin-bottom:14px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.lbl{font-size:13px;color:#B9C4B2;min-width:90px}
.stepper{display:flex;align-items:center;border:1px solid #2A3D2F;border-radius:8px;overflow:hidden}
.stepper button{background:#0F1B14;border:none;color:#F4F1E8;padding:8px 16px;font-size:20px;cursor:pointer;line-height:1}
.stepper span{padding:8px 14px;font-size:14px;font-weight:700;min-width:36px;text-align:center}
.hint{font-size:12px;color:#6E8169}
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
input.name-inp{background:#0F1B14;border:1px solid #2A3D2F;border-radius:8px;padding:9px 11px;color:#F4F1E8;font-size:13px;width:100%}
.divider{height:1px;background:#2A3D2F;margin:14px 0}
.btn{background:#9FC93D;color:#0F1B14;border:none;border-radius:8px;padding:12px;font-weight:700;font-size:14px;width:100%;cursor:pointer}
.btn-outline{background:transparent;border:1px solid #9FC93D;color:#9FC93D;border-radius:8px;padding:10px;font-weight:700;font-size:13px;width:100%;cursor:pointer;margin-top:8px}
.btn-link{background:none;border:none;color:#9FC93D;font-size:12px;cursor:pointer;text-decoration:underline;display:block;margin:8px auto 0;text-align:center}
.tabs{display:flex;gap:6px;margin-bottom:14px;background:#16261C;border-radius:10px;padding:4px;border:1px solid #2A3D2F}
.tab{flex:1;padding:9px 4px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:#B9C4B2}
.tab.active{background:#9FC93D;color:#0F1B14}
.round-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.nav-btn{background:transparent;border:1px solid #2A3D2F;color:#F4F1E8;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.round-lbl{text-align:center}
.round-big{font-family:Georgia,serif;font-size:19px;font-weight:700}
.round-small{font-size:12px;color:#B9C4B2}
.out-badge{background:rgba(255,255,255,.04);border:1px solid #2A3D2F;border-radius:8px;padding:7px 11px;font-size:12px;color:#6E8169;margin-bottom:12px}
.out-badge strong{color:#F4F1E8}
.court-card{background:#0F1B14;border:1px solid #2A3D2F;border-radius:10px;padding:14px;margin-bottom:10px}
.court-lbl{font-size:11px;color:#9FC93D;font-weight:700;letter-spacing:.1em;margin-bottom:10px}
.team-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.team-name{font-size:13px;font-weight:600}
input.score-inp{width:52px;background:#16261C;border:1px solid #2A3D2F;border-radius:6px;color:#F4F1E8;font-size:15px;text-align:center;padding:6px 4px}
.vs{font-size:11px;color:#6E8169;text-align:center;margin:4px 0}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;letter-spacing:.08em;color:#6E8169;border-bottom:1px solid #2A3D2F;padding:0 6px 7px}
td{padding:8px 6px;border-bottom:1px solid #1D2C22;font-size:12px}
td.name{font-size:13px;font-weight:600}
tr.leader{background:rgba(159,201,61,.08)}
.diff-pos{color:#9FC93D;font-weight:600}
.diff-neg{color:#E08B6B;font-weight:600}
.hist-card{background:#0F1B14;border:1px solid #2A3D2F;border-radius:10px;padding:12px;margin-bottom:10px}
.hist-round{font-size:10px;color:#9FC93D;font-weight:700;letter-spacing:.1em;margin-bottom:8px}
.hist-team{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px}
.hist-score{font-size:18px;font-weight:700;min-width:28px;text-align:right}
.winner-text{color:#9FC93D}
.loser-text{color:#B9C4B2;font-weight:400}
.empty{color:#B9C4B2;font-size:13px;text-align:center;padding:20px 0}
.sync-msg{text-align:center;font-size:11px;margin-bottom:6px;height:16px}
.sync-ok{color:#9FC93D}
.sync-err{color:#E08B6B}
.sheets-note{text-align:center;font-size:12px;color:#6E8169;margin-top:8px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
var SHEETS_URL="https://script.google.com/macros/s/AKfycbyUXLH_CrQ6hWfeb9QIetbYeLJ4AFe0nP6W6MAFWOlrToZnnSGhWMWC7AjFZ_9PK6w3wA/exec";

function buildSchedule(n,numRounds){
  var pc=[],oc=[],played=new Array(n).fill(0),rounds=[];
  for(var i=0;i<n;i++){pc.push(new Array(n).fill(0));oc.push(new Array(n).fill(0));}
  for(var r=0;r<numRounds;r++){
    var best=null,bestScore=Infinity;
    for(var a=0;a<n;a++)for(var b=a+1;b<n;b++)for(var c=0;c<n;c++){
      if(c===a||c===b)continue;
      for(var d=c+1;d<n;d++){
        if(d===a||d===b)continue;
        var s=(pc[a][b]+pc[c][d])*10+(oc[a][c]+oc[a][d]+oc[b][c]+oc[b][d])*5+(played[a]+played[b]+played[c]+played[d]);
        if(s<bestScore){bestScore=s;best={teamA:[a,b],teamB:[c,d]};}
      }
    }
    if(!best)break;
    rounds.push(best);
    var a2=best.teamA[0],b2=best.teamA[1],c2=best.teamB[0],d2=best.teamB[1];
    pc[a2][b2]++;pc[b2][a2]++;pc[c2][d2]++;pc[d2][c2]++;
    [a2,b2].forEach(function(x){[c2,d2].forEach(function(y){oc[x][y]++;oc[y][x]++;});});
    [a2,b2,c2,d2].forEach(function(p){played[p]++;});
  }
  return rounds;
}

var S={
  phase:'setup',tab:'play',
  playerCount:6,roundCount:7,
  names:['Player 1','Player 2','Player 3','Player 4','Player 5','Player 6'],
  round:0,scores:{},schedule:[],syncMsg:''
};

function setState(u){Object.assign(S,u);render();}

function syncToSheets(){
  var history=S.schedule.map(function(m,r){
    var e=S.scores[r]||{};
    if(e.a===undefined||e.a===''||e.b===undefined||e.b==='')return null;
    var a=parseFloat(e.a),b=parseFloat(e.b);
    if(isNaN(a)||isNaN(b))return null;
    return{round:r+1,teamA:m.teamA.map(function(p){return S.names[p];}).join(' & '),scoreA:a,scoreB:b,
      teamB:m.teamB.map(function(p){return S.names[p];}).join(' & '),
      winner:a>b?m.teamA.map(function(p){return S.names[p];}).join(' & '):b>a?m.teamB.map(function(p){return S.names[p];}).join(' & '):'Tie'};
  }).filter(Boolean);
  var rnk=getRankings();
  fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({history:history,rankings:rnk})})
    .then(function(){setState({syncMsg:'ok'});setTimeout(function(){setState({syncMsg:''}); },2500);})
    .catch(function(){setState({syncMsg:'err'});setTimeout(function(){setState({syncMsg:''});},2500);});
}

function getStats(){
  var n=S.playerCount;
  var t=Array.from({length:n},function(){return{pts:0,allowed:0,wins:0,losses:0,played:0};});
  S.schedule.forEach(function(m,r){
    var e=S.scores[r]||{};
    if(e.a===undefined||e.a===''||e.b===undefined||e.b==='')return;
    var a=parseFloat(e.a),b=parseFloat(e.b);
    if(isNaN(a)||isNaN(b))return;
    m.teamA.forEach(function(p){t[p].pts+=a;t[p].allowed+=b;t[p].played++;if(a>b)t[p].wins++;else if(a<b)t[p].losses++;});
    m.teamB.forEach(function(p){t[p].pts+=b;t[p].allowed+=a;t[p].played++;if(b>a)t[p].wins++;else if(b<a)t[p].losses++;});
  });
  return t;
}

function getRankings(){
  var stats=getStats();
  return S.names.map(function(name,i){return Object.assign({name:name,i:i,diff:stats[i].pts-stats[i].allowed},stats[i]);})
    .sort(function(x,y){return y.wins-x.wins||y.diff-x.diff||y.pts-x.pts||x.allowed-y.allowed;});
}

function h(tag,attrs,kids){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==='cls')e.className=attrs[k];
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(k==='disabled'){if(attrs[k])e.disabled=true;}
    else e.setAttribute(k,attrs[k]);
  });
  (kids||[]).forEach(function(c){
    if(c==null)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return e;
}

function stepper(val,onDec,onInc,hint){
  var kids=[
    h('button',{cls:'',onclick:onDec},['−']),
    h('span',{},[ val]),
    h('button',{onclick:onInc},['+']),
  ];
  var s=h('div',{cls:'stepper'},kids);
  s.querySelector('button').style.cssText='background:#0F1B14;border:none;color:#F4F1E8;padding:8px 16px;font-size:20px;cursor:pointer;';
  s.querySelectorAll('button')[1].style.cssText='background:#0F1B14;border:none;color:#F4F1E8;padding:8px 16px;font-size:20px;cursor:pointer;';
  var wrap=h('div',{cls:'row'},[h('span',{cls:'lbl'},[hint]),s]);
  return wrap;
}

function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(S.phase==='setup'?renderSetup():renderMain());
}

function renderSetup(){
  var nameInputs=S.names.map(function(n,i){
    var inp=h('input',{cls:'name-inp',placeholder:'Player '+(i+1)});
    inp.value=n;
    inp.oninput=function(){var x=S.names.slice();x[i]=this.value;setState({names:x});};
    return inp;
  });

  var startBtn=h('button',{cls:'btn',onclick:function(){
    setState({schedule:buildSchedule(S.playerCount,S.roundCount),phase:'play',tab:'play',round:0,scores:{}});
  }},['Start Tournament']);

  var pcRow=h('div',{cls:'row'},[
    h('span',{cls:'lbl'},['Players']),
    h('div',{cls:'stepper'},[
      makeStepBtn('−',function(){var n=Math.max(4,S.playerCount-1);var names=Array.from({length:n},function(_,i){return S.names[i]||'Player '+(i+1);});setState({playerCount:n,names:names});}),
      h('span',{},[''+S.playerCount]),
      makeStepBtn('+',function(){var n=Math.min(12,S.playerCount+1);var names=Array.from({length:n},function(_,i){return S.names[i]||'Player '+(i+1);});setState({playerCount:n,names:names});})
    ]),
    h('span',{cls:'hint'},['(4–12)'])
  ]);

  var rcRow=h('div',{cls:'row'},[
    h('span',{cls:'lbl'},['Rounds']),
    h('div',{cls:'stepper'},[
      makeStepBtn('−',function(){setState({roundCount:Math.max(1,S.roundCount-1)});}),
      h('span',{},[''+S.roundCount]),
      makeStepBtn('+',function(){setState({roundCount:S.roundCount+1});})
    ])
  ]);

  return h('div',{},[
    h('p',{cls:'eyebrow'},['TOURNAMENT TRACKER']),
    h('h1',{},['Round Robin']),
    h('p',{cls:'sub'},['1 court · rotating partners & opponents']),
    h('div',{cls:'card'},[
      h('div',{cls:'card-title'},['Setup']),
      pcRow,rcRow,
      h('div',{cls:'divider'},[]),
      h('div',{cls:'card-title'},['Player Names']),
      h('div',{cls:'name-grid'},nameInputs),
      startBtn
    ]),
    h('p',{cls:'sheets-note'},['🔗 Linked to Google Sheets'])
  ]);
}

function makeStepBtn(label,fn){
  var btn=document.createElement('button');
  btn.textContent=label;
  btn.style.cssText='background:#0F1B14;border:none;color:#F4F1E8;padding:8px 16px;font-size:20px;cursor:pointer;line-height:1;';
  btn.onclick=fn;
  return btn;
}

function renderMain(){
  var m=S.schedule[S.round];
  var entry=S.scores[S.round]||{};
  var allP=Array.from({length:S.playerCount},function(_,i){return i;});
  var active=m?m.teamA.concat(m.teamB):[];
  var out=allP.filter(function(i){return active.indexOf(i)<0;});
  var rankings=getRankings();

  var tabBar=h('div',{cls:'tabs'},[
    makeTab('play','▶ Play'),makeTab('rankings','🏆 Rankings'),makeTab('history','📋 History')
  ]);

  var syncEl=h('p',{cls:'sync-msg '+(S.syncMsg==='ok'?'sync-ok':S.syncMsg==='err'?'sync-err':'')},
    [S.syncMsg==='ok'?'✓ Synced to Google Sheets':S.syncMsg==='err'?'⚠ Sync failed':'']);

  var content;
  if(S.tab==='play') content=renderPlayTab(m,entry,out);
  else if(S.tab==='rankings') content=renderRankingsTab(rankings);
  else content=renderHistoryTab();

  return h('div',{},[
    h('p',{cls:'eyebrow'},['TOURNAMENT TRACKER']),
    h('h1',{},['Round Robin']),
    syncEl, tabBar, content,
    h('button',{cls:'btn-link',onclick:function(){setState({phase:'setup'});}},['← Back to Setup'])
  ]);
}

function makeTab(id,label){
  var btn=h('button',{cls:'tab'+(S.tab===id?' active':''),onclick:function(){setState({tab:id});}},[ label]);
  return btn;
}

function renderPlayTab(m,entry,out){
  if(!m)return h('div',{cls:'card'},[h('p',{cls:'empty'},['No rounds.'])]);

  var prevBtn=h('button',{cls:'nav-btn',disabled:S.round===0,onclick:function(){setState({round:S.round-1});}},['← Prev']);
  var nextBtn=h('button',{cls:'nav-btn',disabled:S.round===S.roundCount-1,onclick:function(){setState({round:S.round+1});}},['Next →']);

  var aInp=document.createElement('input');
  aInp.className='score-inp';aInp.type='number';aInp.placeholder='0';
  aInp.value=entry.a!==undefined?entry.a:'';
  aInp.oninput=function(){var s=Object.assign({},S.scores);s[S.round]=Object.assign({},s[S.round]||{},{a:this.value});setState({scores:s});syncToSheets();};

  var bInp=document.createElement('input');
  bInp.className='score-inp';bInp.type='number';bInp.placeholder='0';
  bInp.value=entry.b!==undefined?entry.b:'';
  bInp.oninput=function(){var s=Object.assign({},S.scores);s[S.round]=Object.assign({},s[S.round]||{},{b:this.value});setState({scores:s});syncToSheets();};

  var children=[
    h('div',{cls:'round-nav'},[
      prevBtn,
      h('div',{cls:'round-lbl'},[h('div',{cls:'round-big'},['Round '+(S.round+1)]),h('div',{cls:'round-small'},['of '+S.roundCount])]),
      nextBtn
    ])
  ];

  if(out.length>0){
    children.push(h('div',{cls:'out-badge'},['Sitting out: ',h('strong',{},[out.map(function(p){return S.names[p];}).join(', ')])]));
  }

  children.push(h('div',{cls:'court-card'},[
    h('div',{cls:'court-lbl'},['COURT']),
    h('div',{cls:'team-row'},[h('div',{cls:'team-name'},[m.teamA.map(function(p){return S.names[p];}).join(' & ')]),aInp]),
    h('div',{cls:'vs'},['vs']),
    h('div',{cls:'team-row'},[h('div',{cls:'team-name'},[m.teamB.map(function(p){return S.names[p];}).join(' & ')]),bInp])
  ]));

  children.push(h('button',{cls:'btn-outline',onclick:function(){
    var n=S.roundCount+1;setState({roundCount:n,schedule:buildSchedule(S.playerCount,n)});
  }},['+ Add a Round']));

  return h('div',{cls:'card'},children);
}

function renderRankingsTab(rankings){
  var rows=rankings.map(function(r,i){
    var diff=r.diff>0?'+'+r.diff:''+r.diff;
    var diffCls=r.diff>0?'diff-pos':r.diff<0?'diff-neg':'';
    var tdiff=document.createElement('td');tdiff.className=diffCls;tdiff.textContent=diff;
    var tr=document.createElement('tr');if(i===0)tr.className='leader';
    [h('td',{},[i+1]),h('td',{cls:'name'},[r.name]),h('td',{},[r.wins]),h('td',{},[r.losses]),tdiff,h('td',{},[r.pts]),h('td',{},[r.allowed])]
      .forEach(function(td){tr.appendChild(td);});
    return tr;
  });
  return h('div',{cls:'card'},[
    h('div',{cls:'card-title'},['Live Rankings']),
    h('div',{style:'overflow-x:auto'},[
      h('table',{},[
        h('thead',{},[h('tr',{},[h('th',{},['#']),h('th',{},['Player']),h('th',{},['W']),h('th',{},['L']),h('th',{},['Diff']),h('th',{},['Earned']),h('th',{},['Allowed'])])]),
        h('tbody',{},rows)
      ])
    ])
  ]);
}

function renderHistoryTab(){
  var items=S.schedule.map(function(m,r){
    var e=S.scores[r]||{};
    if(e.a===undefined||e.a===''||e.b===undefined||e.b==='')return null;
    var a=parseFloat(e.a),b=parseFloat(e.b);
    if(isNaN(a)||isNaN(b))return null;
    var aWon=a>b,bWon=b>a;
    return h('div',{cls:'hist-card'},[
      h('div',{cls:'hist-round'},['ROUND '+(r+1)]),
      h('div',{cls:'hist-team'},[
        h('div',{cls:'team-name '+(aWon?'winner-text':'loser-text')},[(aWon?'🏆 ':'')+m.teamA.map(function(p){return S.names[p];}).join(' & ')]),
        h('div',{cls:'hist-score '+(aWon?'winner-text':'loser-text')},[''+a])
      ]),
      h('div',{cls:'vs'},['vs']),
      h('div',{cls:'hist-team'},[
        h('div',{cls:'team-name '+(bWon?'winner-text':'loser-text')},[(bWon?'🏆 ':'')+m.teamB.map(function(p){return S.names[p];}).join(' & ')]),
        h('div',{cls:'hist-score '+(bWon?'winner-text':'loser-text')},[''+b])
      ]),
      (!aWon&&!bWon)?h('div',{style:'font-size:11px;color:#B9C4B2;text-align:center;margin-top:4px'},['Tie']):null
    ]);
  }).filter(Boolean);

  return h('div',{cls:'card'},[
    h('div',{cls:'card-title'},['Match History']),
    items.length===0?h('p',{cls:'empty'},['No completed matches yet.']):h('div',{},items)
  ]);
}

render();
</script>
</body>
</html>
